<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1440" />
<title>Gestionnaire PCR — Suivi Radioprotection</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: oklch(0.985 0.003 250);
    --surface: #ffffff;
    --surface-2: oklch(0.975 0.004 250);
    --surface-hover: oklch(0.965 0.005 250);
    --border: oklch(0.92 0.006 250);
    --border-strong: oklch(0.86 0.008 250);
    --text: oklch(0.22 0.02 255);
    --text-muted: oklch(0.48 0.015 255);
    --text-soft: oklch(0.62 0.012 255);
    --accent: oklch(0.52 0.14 245);
    --accent-hover: oklch(0.46 0.15 245);
    --accent-soft: oklch(0.96 0.02 245);
    --accent-soft-border: oklch(0.9 0.04 245);

    --ok: oklch(0.55 0.13 150);
    --ok-bg: oklch(0.965 0.025 150);
    --ok-border: oklch(0.88 0.05 150);

    --warn: oklch(0.62 0.14 65);
    --warn-bg: oklch(0.97 0.04 75);
    --warn-border: oklch(0.88 0.08 70);

    --danger: oklch(0.58 0.18 25);
    --danger-bg: oklch(0.965 0.03 25);
    --danger-border: oklch(0.88 0.08 25);

    --neutral: oklch(0.55 0.01 255);
    --neutral-bg: oklch(0.96 0.004 255);
    --neutral-border: oklch(0.9 0.006 255);

    --radius: 6px;
    --radius-sm: 4px;
    --shadow-sm: 0 1px 0 oklch(0.92 0.006 250 / 0.7);
    --shadow-md: 0 1px 2px rgba(15,23,42,0.04), 0 1px 1px rgba(15,23,42,0.02);
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Public Sans", system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    font-feature-settings: "ss01", "cv11";
  }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "zero"; }

  button { font-family: inherit; cursor: pointer; }
  input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  ::selection { background: oklch(0.85 0.06 245); }

  /* App layout */
  .app {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }

  /* Sidebar */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
  }
  .brand {
    padding: 18px 18px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .brand-mark {
    width: 28px; height: 28px;
    background: var(--text);
    color: white;
    border-radius: 6px;
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: -0.02em;
  }
  .brand-name { font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
  .brand-sub { font-size: 11px; color: var(--text-soft); margin-top: 1px; }

  .nav {
    padding: 12px 10px;
    display: flex; flex-direction: column; gap: 1px;
    flex: 1;
  }
  .nav-section {
    font-size: 11px;
    color: var(--text-soft);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 600;
    padding: 14px 10px 6px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-weight: 500;
    font-size: 13.5px;
    background: transparent;
    border: none;
    text-align: left;
    width: 100%;
    cursor: pointer;
    position: relative;
  }
  .nav-item:hover { background: var(--surface-hover); color: var(--text); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--accent);
  }
  .nav-item .nav-icon { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.75; }
  .nav-item .nav-count {
    margin-left: auto;
    font-size: 11px;
    background: var(--neutral-bg);
    border: 1px solid var(--neutral-border);
    color: var(--text-muted);
    padding: 1px 6px;
    border-radius: 999px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }
  .nav-item.active .nav-count {
    background: white;
    border-color: var(--accent-soft-border);
    color: var(--accent);
  }
  .nav-item .nav-count.danger { background: var(--danger-bg); border-color: var(--danger-border); color: var(--danger); }

  .sidebar-foot {
    padding: 12px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: oklch(0.85 0.04 245);
    color: var(--accent);
    display: grid; place-items: center;
    font-weight: 700;
    font-size: 12px;
  }
  .sidebar-foot .who { font-size: 13px; font-weight: 600; line-height: 1.2; }
  .sidebar-foot .role { font-size: 11px; color: var(--text-soft); }

  /* Main */
  .main {
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    height: 56px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 16px;
    position: sticky; top: 0; z-index: 10;
  }
  .crumb {
    color: var(--text-soft);
    font-size: 13px;
    display: flex; align-items: center; gap: 8px;
  }
  .crumb .sep { opacity: 0.5; }
  .crumb .current { color: var(--text); font-weight: 600; }
  .topbar-spacer { flex: 1; }
  .top-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 6px 10px;
    width: 280px;
    color: var(--text-soft);
  }
  .top-search input { background: transparent; border: 0; outline: 0; flex: 1; font-size: 13px; }
  .top-search kbd {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    background: white;
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    color: var(--text-soft);
  }

  .page {
    padding: 28px 32px 56px;
    max-width: 1320px;
    width: 100%;
  }
  .page-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin-bottom: 24px;
    gap: 24px;
  }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.015em; margin: 0; }
  .page-sub { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
  .page-actions { display: flex; gap: 8px; align-items: center; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 12px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 13px;
    color: var(--text);
    box-shadow: var(--shadow-sm);
    transition: background 0.1s ease, border-color 0.1s ease;
  }
  .btn:hover { background: var(--surface-2); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .btn.primary:hover { background: var(--accent-hover); }
  .btn.ghost { background: transparent; border-color: transparent; box-shadow: none; color: var(--text-muted); }
  .btn.ghost:hover { background: var(--surface-2); color: var(--text); }
  .btn.danger-ghost { background: transparent; border-color: transparent; box-shadow: none; color: var(--danger); }
  .btn .ico { width: 14px; height: 14px; stroke-width: 2; }
  .btn.sm { padding: 4px 8px; font-size: 12px; }
  .btn.icon { padding: 6px; }

  /* Cards */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    box-shadow: var(--shadow-md);
  }
  .card-head {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
  }
  .card-title { font-weight: 600; font-size: 14px; }
  .card-body { padding: 16px; }

  /* Badges */
  .badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 8px 2px 6px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    line-height: 1.4;
    border: 1px solid;
    white-space: nowrap;
  }
  .badge .b-ico { width: 12px; height: 12px; stroke-width: 2.25; }
  .badge.ok { color: var(--ok); background: var(--ok-bg); border-color: var(--ok-border); }
  .badge.warn { color: var(--warn); background: var(--warn-bg); border-color: var(--warn-border); }
  .badge.danger { color: var(--danger); background: var(--danger-bg); border-color: var(--danger-border); }
  .badge.neutral { color: var(--text-muted); background: var(--neutral-bg); border-color: var(--neutral-border); }
  .badge.accent { color: var(--accent); background: var(--accent-soft); border-color: var(--accent-soft-border); }

  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .dot.ok { background: var(--ok); }
  .dot.warn { background: var(--warn); }
  .dot.danger { background: var(--danger); }
  .dot.neutral { background: var(--neutral); }

  /* Table */
  .table-wrap { overflow: hidden; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); box-shadow: var(--shadow-md); }
  table.data {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  table.data thead th {
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--text-soft);
    padding: 10px 14px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  table.data tbody td {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  table.data tbody tr:last-child td { border-bottom: 0; }
  table.data tbody tr { cursor: pointer; }
  table.data tbody tr:hover { background: var(--surface-2); }
  table.data tbody tr.is-selected { background: var(--accent-soft); }
  table.data .num { font-variant-numeric: tabular-nums; font-family: "JetBrains Mono", monospace; font-size: 12.5px; color: var(--text-muted); }
  table.data .name { font-weight: 600; }

  /* KPI tiles */
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    margin-bottom: 20px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 18px;
    box-shadow: var(--shadow-md);
    display: flex; flex-direction: column;
    gap: 10px;
  }
  .kpi-head { display: flex; align-items: center; justify-content: space-between; }
  .kpi-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .kpi-value { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; font-variant-numeric: tabular-nums; }
  .kpi-foot { font-size: 12px; color: var(--text-soft); }
  .kpi.danger .kpi-value { color: var(--danger); }
  .kpi.warn .kpi-value { color: var(--warn); }
  .kpi.ok .kpi-value { color: var(--ok); }

  /* Forms */
  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px 20px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field.full { grid-column: 1 / -1; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-muted); }
  .field input, .field select, .field textarea {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 7px 10px;
    font-size: 13.5px;
    color: var(--text);
    outline: 0;
    transition: border-color 0.1s ease, box-shadow 0.1s ease;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px oklch(0.92 0.04 245);
  }
  .field input[readonly] { background: var(--surface-2); color: var(--text-muted); }

  .section-title {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-soft);
    margin: 0 0 10px;
  }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .tab {
    background: transparent;
    border: 0;
    padding: 10px 14px;
    font-weight: 600;
    font-size: 13.5px;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* Misc */
  .row { display: flex; gap: 10px; align-items: center; }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .muted { color: var(--text-muted); }
  .soft { color: var(--text-soft); }
  .hr { height: 1px; background: var(--border); margin: 16px 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

  .pill-filter {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 3px;
    gap: 2px;
  }
  .pill-filter button {
    border: 0;
    background: transparent;
    padding: 5px 11px;
    font-weight: 600;
    font-size: 12.5px;
    color: var(--text-muted);
    border-radius: 4px;
  }
  .pill-filter button.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: var(--shadow-sm);
  }

  /* Empty page placeholder while react boots */
  .boot { display: grid; place-items: center; height: 100vh; color: var(--text-soft); }
</style>
</head>
<body>
<div id="root"><div class="boot">Chargement…</div></div>

</body>
</html>
