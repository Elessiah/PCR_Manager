<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>PCR Manager — Suivi Radioprotection</title>
    <style>
      html, body { margin: 0; padding: 0; background: #0f172a; }
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #0f172a;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      #splash.fading { opacity: 0; }
      #splash-logo {
        width: 128px;
        height: 128px;
        object-fit: contain;
        margin-bottom: 1rem;
        animation: fadeInScale 0.4s ease-out, pulseGlow 2s infinite 0.4s;
      }
      #splash-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: #fff;
        font-family: 'Public Sans', system-ui, sans-serif;
        margin: 0;
        animation: fadeIn 0.4s ease-out 0.2s both;
      }
      #splash-subtitle {
        font-size: 0.875rem;
        color: #9ca3af;
        margin-top: 0.5rem;
        font-family: 'Public Sans', system-ui, sans-serif;
        animation: fadeIn 0.4s ease-out 0.4s both;
      }
      #splash-progress {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 4px;
        background: #3b82f6;
        animation: fillProgress 1s ease-out forwards;
      }
      @keyframes fadeInScale {
        from { opacity: 0; transform: scale(0.8); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes pulseGlow {
        0%, 100% { filter: drop-shadow(0 0 0px rgba(59,130,246,0.5)); }
        50%       { filter: drop-shadow(0 0 15px rgba(59,130,246,0.7)); }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes fillProgress {
        from { width: 0%; }
        to   { width: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img id="splash-logo" src="/logo.png" alt="PCR Manager Logo" />
      <h1 id="splash-title">PCR Manager</h1>
      <p id="splash-subtitle">Chargement en cours…</p>
      <div id="splash-progress"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
